<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Brand Gradient matching logo.svg -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="premium-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer squircle container -->
  <rect width="256" height="256" rx="68" fill="#090d16" stroke="url(#border-grad)" stroke-width="8" />
  
  <!-- Stylized 'P' Path (scaled up for 256x256) -->
  <!-- Original was at transform (15, 20) in 120x120 container, scaled by ~2x -->
  <!-- Left padding: 30, top padding: 40. Path: M 85 70 h 60 c 38 0 42 55 0 55 h -17 v 63 h -43 V 70 z -->
  <path d="M 85 68 h 60 c 38 0 42 55 0 55 h -17 v 63 h -43 V 68 z" fill="url(#brand-grad)" filter="url(#premium-glow)"/>
  
  <!-- High-tech accent streak -->
  <path d="M 158 187 l 30 -119" stroke="#22d3ee" stroke-width="20" stroke-linecap="round" filter="url(#premium-glow)"/>
</svg>
