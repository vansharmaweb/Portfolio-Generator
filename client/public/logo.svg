<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" fill="none">
  <defs>
    <!-- Premium Gradient from Cyan to Purple -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    
    <!-- Subtle Border Gradient for the Squircle -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="premium-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <style>
      .text-title {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 76px;
        fill: #ffffff;
        letter-spacing: -2px;
      }
      .text-accent {
        fill: #22d3ee;
        font-weight: 800;
      }
    </style>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(15, 20)">
    <!-- Sleek Rounded Squircle Container -->
    <rect width="120" height="120" rx="32" fill="#090d16" stroke="url(#border-grad)" stroke-width="4" />
    
    <!-- Stylized 'P' Path with Gradient and Glow -->
    <path d="M 40 32 h 28 c 18 0 20 26 0 26 h -8 v 30 h -20 V 32 z" fill="url(#brand-grad)" filter="url(#premium-glow)"/>
    
    <!-- High-tech accent streak -->
    <path d="M 74 88 l 14 -56" stroke="#22d3ee" stroke-width="10" stroke-linecap="round" filter="url(#premium-glow)"/>
  </g>

  <!-- Logo Text -->
  <text x="160" y="104" class="text-title" filter="drop-shadow(0px 4px 12px rgba(9,13,22,0.5))">Port<tspan class="text-accent">Gen</tspan></text>
</svg>
